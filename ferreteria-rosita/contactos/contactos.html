<html lang="es">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">ROSITA</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="../inicio/index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="../nosotros/nosotros.html">Nosotros</a></li>
                <li class="nav-item"><a class="nav-link" href="../CATALOGO/catalogo.html">Catalogo</a></li>
                <li class="nav-item"><a class="nav-link active" href="../contactos/contactos.html">Contactos</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- HEADER -->
<header class="bg-dark text-white text-center py-5">
    <div class="container">
        <h1 class="fw-bold">Contáctanos</h1>
        <p class="lead">Estamos para ayudarte</p>
    </div>
</header>

<!-- FORMULARIO -->
<section class="container my-5">
    <div class="row">

        <!-- FORM -->
        <div class="col-md-6">
            <h3 class="mb-4">Envíanos un mensaje</h3>

            <form>
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" placeholder="Tu nombre">
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input type="email" class="form-control" placeholder="tu@email.com">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mensaje</label>
                    <textarea class="form-control" rows="4"></textarea>
                </div>

                <button class="btn btn-danger">Enviar</button>
            </form>
        </div>

        <!-- INFO -->
        <div class="col-md-6">
            <h3 class="mb-4">Información</h3>

            <p><strong>📍 Dirección:</strong> Oruro, Bolivia</p>
            <p><strong>📞 Teléfono:</strong> 12345678</p>
            <p><strong>📧 Email:</strong> rosita@gmail.com</p>

            <!-- MAPA -->
            <iframe 
                src="https://maps.google.com/maps?q=oruro&t=&z=13&ie=UTF8&iwloc=&output=embed"
                width="100%" height="250" style="border:0;" allowfullscreen>
            </iframe>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">© 2026 Ferretería ROSITA</p>
</footer>
